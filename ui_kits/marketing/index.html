<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeonPulse — Marketing UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg-1); }
  body { font-family: var(--font-body); color: var(--fg-1); -webkit-font-smoothing: antialiased; }
  a { color: inherit; }

  /* ---- shared buttons ---- */
  .np-btn-primary, .np-btn-ghost {
    font-family: var(--font-display); font-weight: 600; font-size: 14px;
    border-radius: var(--r-md); padding: 10px 18px; border: 1px solid transparent;
    cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur), background var(--dur);
  }
  .np-btn-primary { background: var(--grad-pulse); color: var(--fg-on-neon); box-shadow: var(--glow-blue); }
  .np-btn-primary:hover { box-shadow: 0 0 0 1px rgba(0,229,255,.5), 0 0 26px rgba(0,229,255,.45); }
  .np-btn-primary:active { transform: scale(0.97); }
  .np-btn-ghost { background: transparent; color: var(--fg-1); border-color: var(--line-2); }
  .np-btn-ghost:hover { border-color: var(--line-glow); color: var(--neon-cyan); }
  .np-btn-ghost:active { transform: scale(0.97); }
  .np-btn-lg { padding: 13px 22px; font-size: 15px; border-radius: var(--r-md); }

  .np-icon-btn {
    width: 38px; height: 38px; border-radius: var(--r-md); border: 1px solid var(--line-2);
    background: var(--bg-2); color: var(--fg-2); display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all var(--dur);
  }
  .np-icon-btn:hover { color: var(--neon-cyan); border-color: var(--line-glow); }

  .np-eyebrow {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3);
  }
  .np-livedot { width: 7px; height: 7px; border-radius: 50%; background: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); animation: np-blink 1.4s infinite; }

  .np-seg { background: var(--bg-2); border: 1px solid var(--line-2); border-radius: var(--r-full); padding: 4px; }
  .np-seg div { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.06em; color: var(--fg-3); padding: 8px 16px; border-radius: var(--r-full); cursor: pointer; transition: all var(--dur); }
  .np-seg div.on { background: var(--grad-pulse); color: var(--fg-on-neon); }

  .icon svg, .np-icon-btn svg, button svg, a svg { width: 18px; height: 18px; stroke-width: 1.9; vertical-align: middle; }
  .npi svg { width: 100%; height: 100%; display: block; stroke-width: 1.9; }

  .np-mobile { display: none; }
  @media (max-width: 880px) {
    .np-desktop { display: none !important; }
    .np-mobile { display: flex; }
    .np-hero-grid { grid-template-columns: 1fr !important; padding-top: 40px; padding-bottom: 40px; }
    .np-feat-grid, .np-price-grid { grid-template-columns: 1fr !important; }
    .np-foot-grid { grid-template-columns: 1fr 1fr !important; }
    .np-h1 { font-size: 44px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script type="text/babel">
  // Icon component — renders a lucide <i>, refreshed after each render
  function Icon({ name, size = 18 }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      const el = ref.current; if (!el || !window.lucide) return;
      el.innerHTML = '<i data-lucide="' + name + '"></i>';
      window.lucide.createIcons();
    });
    return <span ref={ref} className="npi" style={{ display: 'inline-flex', width: size, height: size }} />;
  }
  window.Icon = Icon;
  window.useLucide = function () { React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }); };
</script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
  function App() {
    useLucide();
    return (
      <React.Fragment>
        <Nav />
        <Hero />
        <LogoStrip />
        <Features />
        <Pricing />
        <CTABand />
        <Footer />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
