<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeonPulse — Dashboard UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg-1); }
  body { font-family: var(--font-body); color: var(--fg-1); -webkit-font-smoothing: antialiased; }

  .np-btn-primary, .np-btn-ghost {
    font-family: var(--font-display); font-weight: 600; font-size: 14px;
    border-radius: var(--r-md); padding: 9px 16px; border: 1px solid transparent;
    cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur), border-color var(--dur), color var(--dur);
  }
  .np-btn-primary { background: var(--grad-pulse); color: var(--fg-on-neon); box-shadow: var(--glow-blue); }
  .np-btn-primary:hover { box-shadow: 0 0 0 1px rgba(0,229,255,.5), 0 0 26px rgba(0,229,255,.45); }
  .np-btn-primary:active { transform: scale(0.97); }
  .np-btn-ghost { background: var(--bg-2); color: var(--fg-1); border-color: var(--line-2); }
  .np-btn-ghost:hover { border-color: var(--line-glow); color: var(--neon-cyan); }
  .np-btn-ghost:active { transform: scale(0.97); }

  .np-icon-btn {
    width: 38px; height: 38px; border-radius: var(--r-md); border: 1px solid var(--line-2);
    background: var(--bg-2); color: var(--fg-2); display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all var(--dur);
  }
  .np-icon-btn:hover { color: var(--neon-cyan); border-color: var(--line-glow); }

  .np-livedot { width: 7px; height: 7px; border-radius: 50%; background: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); animation: np-blink 1.4s infinite; flex: none; }
  .np-chip-live { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--neon-cyan); background: var(--info-fill); padding: 4px 10px; border-radius: var(--r-full); }

  .np-seg { background: var(--bg-2); border: 1px solid var(--line-2); border-radius: var(--r-full); padding: 4px; display: inline-flex; }
  .np-seg div { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: var(--fg-3); padding: 7px 14px; border-radius: var(--r-full); cursor: pointer; transition: all var(--dur); }
  .np-seg div.on { background: var(--grad-pulse); color: var(--fg-on-neon); }

  .np-row { transition: background var(--dur); }
  .np-row:hover { background: var(--bg-3); }

  button svg, a svg, .np-icon-btn svg { stroke-width: 1.9; }
  .npi svg { width: 100%; height: 100%; display: block; stroke-width: 1.9; }

  @keyframes np-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes np-pop { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes np-slide-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

  @media (max-width: 920px) {
    .np-stat-grid { grid-template-columns: 1fr 1fr !important; }
    .np-chart-grid { grid-template-columns: 1fr !important; }
    .np-search { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script type="text/babel">
  function Icon({ name, size = 18 }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      const el = ref.current; if (!el || !window.lucide) return;
      el.innerHTML = '<i data-lucide="' + name + '"></i>';
      window.lucide.createIcons();
    });
    return <span ref={ref} className="npi" style={{ display: 'inline-flex', width: size, height: size }} />;
  }
  window.Icon = Icon;
  window.useLucide = function () { React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }); };
</script>
<script type="text/babel" src="Charts.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Overview.jsx"></script>
<script type="text/babel" src="Overlays.jsx"></script>
<script type="text/babel">
  function App() {
    useLucide();
    const [active, setActive] = React.useState('Overview');
    const [range, setRange] = React.useState('Live');
    const [modal, setModal] = React.useState(false);
    const [toasts, setToasts] = React.useState([]);

    const pushToast = (t) => {
      const id = Date.now() + Math.random();
      setToasts(ts => [...ts, { ...t, id }]);
      setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 4200);
    };
    const dismiss = (id) => setToasts(ts => ts.filter(x => x.id !== id));

    const onDeploy = (region) => {
      pushToast({ type: 'info', title: 'Deploy started', body: 'building image · ' + region });
      setTimeout(() => pushToast({ type: 'success', title: 'Deployed. Live in ' + region, body: '42ms p99 · 3 nodes online' }), 1600);
    };

    return (
      <div style={{ display: 'flex', minHeight: '100vh' }}>
        <Sidebar active={active} setActive={setActive} />
        <main style={{ flex: 1, minWidth: 0 }}>
          <Topbar onDeploy={() => setModal(true)} />
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px 0' }}>
            <div>
              <div className="np-label" style={{ fontSize: 10 }}>{active}</div>
              <h1 style={{ font: 'var(--h2)', color: 'var(--fg-1)', margin: '6px 0 0' }}>
                {active === 'Overview' ? 'Realtime overview' : active}
              </h1>
            </div>
            <div className="np-seg">
              {['Live', '1H', '24H', '7D'].map(r => (
                <div key={r} className={range === r ? 'on' : ''} onClick={() => setRange(r)}>{r}</div>
              ))}
            </div>
          </div>
          {active === 'Overview'
            ? <Overview range={range} />
            : <div style={{ padding: 24 }}>
                <div style={{ background: 'var(--bg-2)', border: '1px solid var(--line-2)', borderRadius: 'var(--r-lg)', padding: 48, textAlign: 'center', color: 'var(--fg-3)', fontFamily: 'var(--font-mono)', fontSize: 13 }}>
                  <div style={{ marginBottom: 10, color: 'var(--neon-cyan)' }}><Icon name="construction" size={22} /></div>
                  {active} · placeholder view
                </div>
              </div>}
        </main>
        <Modal open={modal} onClose={() => setModal(false)} onDeploy={onDeploy} />
        <Toasts items={toasts} dismiss={dismiss} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
