<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:22px 24px;font-family:var(--font-mono)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .badge{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 11px;border-radius:var(--r-full);display:inline-flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%}
  .live{color:#18f0a0;background:var(--success-fill)}
  .warn{color:#ffcf3a;background:var(--warning-fill)}
  .err{color:#ff3b6b;background:var(--danger-fill)}
  .info{color:#00e5ff;background:var(--info-fill)}
  .neutral{color:var(--fg-2);background:var(--bg-3)}
  .pulse{animation:np-blink 1.4s infinite}
</style></head>
<body>
  <div class="lab">Badges &amp; status</div>
  <div class="row">
    <span class="badge live"><span class="dot pulse" style="background:#18f0a0"></span>Online</span>
    <span class="badge warn"><span class="dot" style="background:#ffcf3a"></span>Degraded</span>
    <span class="badge err"><span class="dot" style="background:#ff3b6b"></span>Offline</span>
    <span class="badge info"><span class="dot" style="background:#00e5ff"></span>Syncing</span>
    <span class="badge neutral">v3.2.0</span>
  </div>
  <div class="row">
    <span class="badge neutral">Draft</span>
    <span class="badge live">+24.6%</span>
    <span class="badge info">Beta</span>
    <span class="badge neutral">US-EAST</span>
  </div>
</body></html>
