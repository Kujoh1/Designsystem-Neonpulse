<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:20px 24px;font-family:var(--font-body)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:16px;font-family:var(--font-mono)}
  .row{display:flex;gap:14px}
  .card{flex:1;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow-1)}
  .card.hl{border-color:transparent;box-shadow:var(--glow-soft);background:linear-gradient(var(--bg-2),var(--bg-2)) padding-box,var(--grad-pulse) border-box;border:1px solid transparent}
  .ct{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--fg-3)}
  .cm{font:var(--h2);color:var(--fg-1);margin:8px 0 2px;font-family:var(--font-display)}
  .cd{font-size:12px;color:var(--neon-cyan);font-family:var(--font-mono)}
  .cp{font-size:13px;color:var(--fg-2);margin-top:8px;line-height:1.5}
</style></head>
<body>
  <div class="lab">Cards · flat fill, hairline border, neon on hover/active</div>
  <div class="row">
    <div class="card"><span class="ct">Requests</span><div class="cm">1.24M</div><span class="cd">+24.6% ↑</span></div>
    <div class="card hl"><span class="ct">Latency · live</span><div class="cm">42ms</div><span class="cd">p99 · us-east</span></div>
    <div class="card"><span class="ct">Nodes</span><div class="cm">18</div><p class="cp">All healthy. Auto-scale armed.</p></div>
  </div>
</body></html>
