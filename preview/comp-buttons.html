<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:22px 24px;font-family:var(--font-display)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  button{font-family:var(--font-display);font-weight:600;font-size:14px;border-radius:var(--r-md);padding:11px 20px;border:1px solid transparent;cursor:pointer}
  .primary{background:var(--grad-pulse);color:var(--fg-on-neon);box-shadow:var(--glow-blue)}
  .hot{background:var(--grad-pulse-hot);color:#fff;box-shadow:var(--glow-magenta)}
  .ghost{background:transparent;color:var(--fg-1);border-color:var(--line-2)}
  .ghost-neon{background:transparent;color:var(--neon-cyan);border-color:var(--line-glow)}
  .quiet{background:var(--bg-3);color:var(--fg-2)}
  .disabled{background:var(--bg-2);color:var(--fg-4);cursor:not-allowed}
  .pill{border-radius:var(--r-full)}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);letter-spacing:0.1em}
</style></head>
<body>
  <div class="lab">Buttons</div>
  <div class="row">
    <button class="primary">Deploy →</button>
    <button class="hot">Go live</button>
    <button class="ghost-neon">Connect</button>
    <button class="ghost">Cancel</button>
  </div>
  <div class="row">
    <button class="primary pill">Sync now</button>
    <button class="quiet">Secondary</button>
    <button class="disabled">Disabled</button>
    <span class="cap">primary · hot · ghost-neon · ghost · pill · quiet · disabled</span>
  </div>
</body></html>
