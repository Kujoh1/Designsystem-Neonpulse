<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:22px 24px;font-family:var(--font-body)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:14px}
  .big{font:var(--display-l);color:var(--fg-1);letter-spacing:-0.02em;margin:0 0 6px}
  .meta{font-family:var(--font-mono);font-size:12px;color:var(--neon-cyan);letter-spacing:0.04em}
  .row{display:flex;justify-content:space-between;align-items:flex-end;gap:16px}
</style></head>
<body>
  <div class="lab">Display · Space Grotesk</div>
  <div class="row">
    <div>
      <div class="big">Ship at the<br>speed of light</div>
    </div>
  </div>
  <div class="meta" style="margin-top:14px">700 · 48px/1.06 · tracking -0.02em</div>
</body></html>
