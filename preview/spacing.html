<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:20px 24px;font-family:var(--font-mono)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:18px;font-family:var(--font-mono)}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px}
  .name{font-size:11px;color:var(--neon-cyan);width:52px}
  .bar{height:14px;background:var(--grad-pulse);border-radius:3px}
  .px{font-size:10px;color:var(--fg-3)}
</style></head>
<body>
  <div class="lab">Spacing · 4px base</div>
  <div class="row"><span class="name">s-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="name">s-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="name">s-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="name">s-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="name">s-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="name">s-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="name">s-12</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="name">s-16</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
</body></html>
