<!-- @dsCard group="Patterns" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg-page);padding:22px 24px;font-family:var(--font-body)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--color-text-muted);font-family:var(--font-mono);margin:0 0 12px}
  .lab:not(:first-child){margin-top:26px}
  /* demo blocks so the primitives are visible */
  .b{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--r-md);
     padding:14px 16px;font-family:var(--font-mono);font-size:12px;color:var(--color-text-secondary)}
  .chip{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--r-full);
        padding:7px 14px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--color-text-secondary)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .name{font-family:var(--font-mono);font-size:10px;color:var(--color-accent);letter-spacing:0.08em;margin-bottom:8px}
</style></head>
<body>
  <div class="cols">
    <div>
      <div class="name">.np-stack</div>
      <div class="np-stack np-stack--tight">
        <div class="b">stacked block</div>
        <div class="b">consistent vertical rhythm</div>
        <div class="b">gap via --s-* tokens</div>
      </div>
    </div>
    <div>
      <div class="name">.np-cluster</div>
      <div class="np-cluster">
        <span class="chip">Connect</span><span class="chip">Deploy</span>
        <span class="chip">Sync</span><span class="chip">Logs</span><span class="chip">Settings</span>
      </div>
    </div>
  </div>

  <div class="name" style="margin-top:24px">.np-grid · auto-fill, minmax(--np-grid-min)</div>
  <div class="np-grid" style="--np-grid-min:130px">
    <div class="b">cell</div><div class="b">cell</div><div class="b">cell</div>
    <div class="b">cell</div><div class="b">cell</div><div class="b">cell</div>
  </div>

  <div class="name" style="margin-top:24px">.np-section + .np-divider · vertical section rhythm</div>
  <div class="b" style="text-align:center;color:var(--color-text-muted)">section A</div>
  <hr class="np-divider" style="margin:16px 0">
  <div class="b" style="text-align:center;color:var(--color-text-muted)">section B</div>
</body></html>
