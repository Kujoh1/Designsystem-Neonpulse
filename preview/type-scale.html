<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:20px 24px;font-family:var(--font-body)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:14px}
  .row{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--line-1)}
  .row:last-child{border-bottom:none}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--neon-cyan);width:88px;letter-spacing:0.06em}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-left:auto}
  .s1{font:var(--h1);color:var(--fg-1)}
  .s2{font:var(--h2);color:var(--fg-1)}
  .s3{font:var(--h3);color:var(--fg-1)}
  .s4{font:var(--body-lg);color:var(--fg-2)}
  .s5{font:var(--body);color:var(--fg-2)}
</style></head>
<body>
  <div class="lab">Type scale</div>
  <div class="row"><span class="name">h1</span><span class="s1">Aa</span><span class="spec">700 · 36px</span></div>
  <div class="row"><span class="name">h2</span><span class="s2">Aa</span><span class="spec">600 · 28px</span></div>
  <div class="row"><span class="name">h3</span><span class="s3">Aa</span><span class="spec">600 · 22px</span></div>
  <div class="row"><span class="name">body-lg</span><span class="s4">Aa</span><span class="spec">400 · 18px</span></div>
  <div class="row"><span class="name">body</span><span class="s5">Aa</span><span class="spec">400 · 16px</span></div>
</body></html>
