<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:22px 24px;font-family:var(--font-mono)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:16px;font-family:var(--font-mono)}
  .grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
  .chip{font-family:var(--font-mono);font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-2);border:1px solid var(--line-2);border-radius:var(--r-full);padding:6px 12px}
  .live{color:var(--neon-cyan);border-color:var(--line-glow)}
  .data{font-family:var(--font-mono);color:var(--fg-1);font-size:26px;letter-spacing:0.02em}
  .data b{color:var(--success)}
  .meta{font-size:12px;color:var(--neon-cyan);letter-spacing:0.04em;margin-top:14px}
</style></head>
<body>
  <div class="lab">HUD / Data · JetBrains Mono</div>
  <div class="grid">
    <span class="chip live">● LIVE</span>
    <span class="chip">SYSTEM STATUS</span>
    <span class="chip">v3.2.0</span>
    <span class="chip">US-EAST</span>
  </div>
  <div class="data">1,204 ms · <b>+24.6%</b> · 99.98%</div>
  <div class="meta">UPPERCASE · 0.14em tracking · tabular figures</div>
</body></html>
