<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:20px 24px;font-family:var(--font-mono)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:16px;font-family:var(--font-mono)}
  .row{display:flex;gap:12px}
  .sw{flex:1;height:96px;border-radius:var(--r-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#07070d}
  .n{font-size:11px;font-weight:700;letter-spacing:0.04em}
  .h{font-size:10px;opacity:0.7}
</style></head>
<body>
  <div class="lab">Neon accents · use as ~10% signal</div>
  <div class="row">
    <div class="sw" style="background:#2d7bff;box-shadow:var(--glow-blue)"><span class="n">blue</span><span class="h">#2D7BFF</span></div>
    <div class="sw" style="background:#00e5ff;box-shadow:var(--glow-cyan)"><span class="n">cyan</span><span class="h">#00E5FF</span></div>
    <div class="sw" style="background:#7c4dff;color:#fff"><span class="n">violet</span><span class="h">#7C4DFF</span></div>
    <div class="sw" style="background:#ff2d9b;color:#fff;box-shadow:var(--glow-magenta)"><span class="n">magenta · pulse</span><span class="h">#FF2D9B</span></div>
  </div>
</body></html>
