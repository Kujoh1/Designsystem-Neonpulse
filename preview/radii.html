<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:20px 24px;font-family:var(--font-mono)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:14px;align-items:flex-end}
  .b{background:var(--bg-3);border:1px solid var(--line-2);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
  .b span{font-size:9px;color:var(--fg-3)}
  .t{border-top-color:var(--neon-cyan)!important;border-top-width:1.5px}
</style></head>
<body>
  <div class="lab">Corner radii · soft rounded</div>
  <div class="row">
    <div class="b" style="width:70px;height:70px;border-radius:8px"><span>sm · 8</span></div>
    <div class="b" style="width:70px;height:70px;border-radius:12px"><span>md · 12</span></div>
    <div class="b" style="width:70px;height:70px;border-radius:16px"><span>lg · 16</span></div>
    <div class="b" style="width:70px;height:70px;border-radius:20px"><span>xl · 20</span></div>
    <div class="b" style="width:70px;height:70px;border-radius:28px"><span>2xl · 28</span></div>
    <div class="b" style="width:70px;height:70px;border-radius:999px"><span>full</span></div>
  </div>
</body></html>
