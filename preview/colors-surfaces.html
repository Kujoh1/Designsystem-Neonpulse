<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:20px 24px;font-family:var(--font-mono)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:16px;font-family:var(--font-mono)}
  .row{display:flex;gap:10px}
  .sw{flex:1;height:88px;border-radius:var(--r-md);border:1px solid var(--line-2);display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .n{font-size:10px;color:var(--fg-2);letter-spacing:0.06em}
  .h{font-size:10px;color:var(--fg-3)}
</style></head>
<body>
  <div class="lab">Surfaces · cool near-black ramp</div>
  <div class="row">
    <div class="sw" style="background:#07070d"><span class="n">bg-0</span><span class="h">#07070D</span></div>
    <div class="sw" style="background:#0c0c16"><span class="n">bg-1</span><span class="h">#0C0C16</span></div>
    <div class="sw" style="background:#12121f"><span class="n">bg-2</span><span class="h">#12121F</span></div>
    <div class="sw" style="background:#1a1a2b"><span class="n">bg-3</span><span class="h">#1A1A2B</span></div>
    <div class="sw" style="background:#24243a"><span class="n">bg-4</span><span class="h">#24243A</span></div>
  </div>
</body></html>
