<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:22px 24px;font-family:var(--font-body)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:14px}
  p{font:var(--body-lg);color:var(--fg-2);margin:0 0 10px;max-width:600px}
  .meta{font-family:var(--font-mono);font-size:12px;color:var(--neon-cyan);letter-spacing:0.04em;margin-top:14px}
</style></head>
<body>
  <div class="lab">Body · Sora</div>
  <p style="color:var(--fg-1)">Realtime infrastructure for teams that move fast. Spin up nodes, watch them go live, and never lose the signal.</p>
  <p style="font:var(--body-sm);color:var(--fg-3)">Secondary copy steps down to fg-2 and fg-3 for hierarchy on the dark canvas.</p>
  <div class="meta">400 / 500 / 600 · 14–18px · 1.6 line-height</div>
</body></html>
