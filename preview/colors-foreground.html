<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:20px 24px;font-family:var(--font-mono)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:16px;font-family:var(--font-mono)}
  .row{display:flex;gap:10px}
  .sw{flex:1;border:1px solid var(--line-1);border-radius:var(--r-md);padding:12px;background:var(--bg-2)}
  .dot{width:26px;height:26px;border-radius:var(--r-full);margin-bottom:10px}
  .n{font-size:10px;color:var(--fg-3);letter-spacing:0.06em;display:block}
  .ex{font-size:15px;margin-top:6px}
</style></head>
<body>
  <div class="lab">Foreground · cool whites</div>
  <div class="row">
    <div class="sw"><div class="dot" style="background:#eef1fb"></div><span class="n">fg-1 · primary</span><div class="ex" style="color:#eef1fb">Aa</div></div>
    <div class="sw"><div class="dot" style="background:#aab0c8"></div><span class="n">fg-2 · secondary</span><div class="ex" style="color:#aab0c8">Aa</div></div>
    <div class="sw"><div class="dot" style="background:#6c7290"></div><span class="n">fg-3 · muted</span><div class="ex" style="color:#6c7290">Aa</div></div>
    <div class="sw"><div class="dot" style="background:#454b66"></div><span class="n">fg-4 · faint</span><div class="ex" style="color:#454b66">Aa</div></div>
  </div>
</body></html>
