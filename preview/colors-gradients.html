<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:20px 24px;font-family:var(--font-mono)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:16px;font-family:var(--font-mono)}
  .row{display:flex;gap:12px}
  .sw{flex:1;height:90px;border-radius:var(--r-lg);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff}
  .n{font-size:11px;font-weight:700}
  .h{font-size:10px;opacity:0.75}
</style></head>
<body>
  <div class="lab">Signature gradients</div>
  <div class="row">
    <div class="sw" style="background:var(--grad-pulse);color:#07070d"><span class="n">--grad-pulse</span><span class="h">blue → cyan · primary actions</span></div>
    <div class="sw" style="background:var(--grad-pulse-hot)"><span class="n">--grad-pulse-hot</span><span class="h">violet → magenta · energy</span></div>
    <div class="sw" style="background:#0c0c16;background-image:var(--grad-haze);border:1px solid var(--line-2)"><span class="n">--grad-haze</span><span class="h">ambient corner wash</span></div>
  </div>
</body></html>
