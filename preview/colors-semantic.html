<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:20px 24px;font-family:var(--font-mono)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:16px;font-family:var(--font-mono)}
  .row{display:flex;gap:12px}
  .col{flex:1}
  .sw{height:44px;border-radius:var(--r-md) var(--r-md) 0 0;display:flex;align-items:center;padding:0 12px;font-size:11px;font-weight:700;color:#07070d}
  .fill{height:34px;border-radius:0 0 var(--r-md) var(--r-md);border:1px solid var(--line-1);border-top:none;display:flex;align-items:center;padding:0 12px;font-size:10px}
</style></head>
<body>
  <div class="lab">Semantic · solid + 14% tinted fill</div>
  <div class="row">
    <div class="col"><div class="sw" style="background:#18f0a0">success</div><div class="fill" style="background:var(--success-fill);color:#18f0a0">badge / alert</div></div>
    <div class="col"><div class="sw" style="background:#ffcf3a">warning</div><div class="fill" style="background:var(--warning-fill);color:#ffcf3a">badge / alert</div></div>
    <div class="col"><div class="sw" style="background:#ff3b6b">danger</div><div class="fill" style="background:var(--danger-fill);color:#ff3b6b">badge / alert</div></div>
    <div class="col"><div class="sw" style="background:#00e5ff">info</div><div class="fill" style="background:var(--info-fill);color:#00e5ff">badge / alert</div></div>
  </div>
</body></html>
