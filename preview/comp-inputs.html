<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:22px 24px;font-family:var(--font-body)}
  .lab{font:var(--mono-label);letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--fg-3);margin-bottom:16px;font-family:var(--font-mono)}
  .field{margin-bottom:14px}
  .flab{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--fg-3);display:block;margin-bottom:7px}
  input{width:100%;box-sizing:border-box;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-md);padding:11px 14px;color:var(--fg-1);font-family:var(--font-body);font-size:14px;outline:none}
  input::placeholder{color:var(--fg-4)}
  .focused{border-color:transparent;box-shadow:var(--glow-cyan)}
  .row{display:flex;gap:14px}
  .col{flex:1}
  .tog{display:flex;align-items:center;gap:10px;margin-top:4px}
  .switch{width:42px;height:24px;border-radius:var(--r-full);background:var(--grad-pulse);position:relative;box-shadow:var(--glow-blue)}
  .knob{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:#fff}
  .sw-off{background:var(--bg-3);box-shadow:none}
  .sw-off .knob{left:3px;right:auto;background:var(--fg-3)}
  .st{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
</style></head>
<body>
  <div class="lab">Inputs &amp; controls</div>
  <div class="row">
    <div class="col field"><span class="flab">Project name</span><input value="aurora-core"></div>
    <div class="col field"><span class="flab">API key · focused</span><input class="focused" value="sk_live_••••4f2a"></div>
  </div>
  <div class="row" style="align-items:center">
    <div class="col field" style="margin:0"><span class="flab">Region</span><input placeholder="us-east-1"></div>
    <div class="col" style="display:flex;gap:22px;padding-top:6px">
      <div class="tog"><div class="switch"><div class="knob"></div></div><span class="st">Auto-scale</span></div>
      <div class="tog"><div class="switch sw-off"><div class="knob"></div></div><span class="st">Verbose</span></div>
    </div>
  </div>
</body></html>
